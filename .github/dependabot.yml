# Mises à jour de dépendances automatisées (Dependabot).
# Trois écosystèmes présents dans le dépôt : Cargo (workspace Rust),
# npm (SDK TypeScript) et GitHub Actions (workflows CI/release).
# Les advisories RustSec sont déjà couvertes par `cargo deny` en CI (scan
# quotidien) ; Dependabot couvre ici les *mises à jour de version* + les
# alertes de sécurité GitHub natives.
version: 2
updates:
  # Workspace Rust (Cargo.toml racine + crates/*, bin/*).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Regroupe les MAJ mineures/patch en une seule PR pour réduire le bruit ;
      # les majeures restent isolées (revue au cas par cas).
      cargo-minor:
        update-types:
          - minor
          - patch

  # SDK TypeScript (@carbon-fr/sdk).
  - package-ecosystem: npm
    directory: "/sdk/typescript"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # Actions des workflows GitHub (.github/workflows/*).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
