name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Scan quotidien : une CVE publiée après le dernier commit serait sinon
  # invisible jusqu'au prochain PR (le job `deny` relance les advisories).
  schedule:
    - cron: "0 6 * * *"

# Annule les exécutions obsolètes sur une même branche / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain Rust stable (fmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  deny:
    name: cargo-deny (licences + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # L'action installe cargo-deny et lance les quatre contrôles
      # (advisories, bans, licenses, sources) selon ./deny.toml.
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  test:
    name: tests (avec PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carbonfr_test
        ports:
          - 5432:5432
        # Le health-check garantit que Postgres accepte les connexions avant
        # les tests (évite les « connection reset » au démarrage).
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Active les tests d'intégration de carbonfr-adapter-postgres.
      # Les migrations sont appliquées par le test lui-même.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/carbonfr_test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Tests du workspace
        # Les tests ODRÉ « live » sont #[ignore] (réseau + quota) : non exécutés.
        run: cargo test --workspace

  build-release:
    name: build release (artefact déployable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Garantit que le binaire de prod compile (profil release optimisé) et que
      # le lockfile est cohérent (`--locked`).
      - name: Build du serveur (release)
        run: cargo build --release --locked -p server --bin carbonfr-server

  sdk-typescript:
    name: SDK TypeScript (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Install (lockfile)
        run: npm ci
      - name: Typecheck + build
        run: npm run build
