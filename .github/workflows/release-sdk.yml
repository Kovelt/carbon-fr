name: Publier le SDK TypeScript

# Publie @carbon-fr/sdk sur npm quand un tag `sdk-v*` est poussé.
# Exemple : git tag sdk-v0.2.0 && git push origin sdk-v0.2.0
#
# Authentification = Trusted Publishing (OIDC) : AUCUN jeton npm. npm échange
# l'identité OIDC de ce workflow (id-token: write) contre un droit de publication,
# et la provenance est générée automatiquement.
#
# Prérequis (une seule fois, côté npmjs.com) :
#   Page du paquet → Settings → Trusted Publisher → Add → GitHub Actions :
#     - Organization or user : Kovelt
#     - Repository           : carbon-fr
#     - Workflow filename     : release-sdk.yml
#     - Environment           : (laisser vide)
#   → le secret NPM_TOKEN n'est alors plus utilisé (peut être supprimé).

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write # OIDC : trusted publishing + provenance vérifiable

jobs:
  publish:
    name: Build + publish npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      # Trusted Publishing exige npm >= 11.5.1 (le node 20 embarque npm 10).
      - name: Mettre npm à jour (OIDC)
        run: npm install -g npm@latest

      - name: Install (lockfile)
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      # Garde-fou : le tag (sdk-vX.Y.Z) doit correspondre à la version de package.json.
      - name: Vérifier que le tag == version du paquet
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) ≠ package.json ($PKG_VERSION)"
            exit 1
          fi

      # Pas de NODE_AUTH_TOKEN : l'auth se fait via OIDC (trusted publisher npm).
      - name: Publish
        run: npm publish --access public
