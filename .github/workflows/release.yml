name: Release (image Docker)

# Construit et publie l'image de prod sur GHCR quand un tag `vX.Y.Z` est poussé.
# Exemple : git tag v0.1.0 && git push origin v0.1.0  (ADR-0019)
#
# L'image est taguée par version SemVer (vX.Y.Z → X.Y.Z + X.Y) + `latest`.
# Aucun secret : l'auth GHCR se fait via le GITHUB_TOKEN du workflow
# (`packages: write`), même esprit OIDC/sans-jeton que release-sdk.yml.
#
# Une fois l'image publiée, le job `release` crée (ou met à jour) la **GitHub
# Release** du tag, avec les notes extraites de la section correspondante du
# CHANGELOG → tag, image et Release restent alignés en une seule opération.
#
# L'image déployée (VPS Kovelt, ADR-0007) se tire alors de :
#   ghcr.io/kovelt/carbon-fr:X.Y.Z   (épingler la version exacte en prod)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Kovelt/carbon-fr → minusculé par metadata-action

jobs:
  image:
    name: Build + push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Garde-fou : le tag (vX.Y.Z) doit correspondre à la version du workspace
      # (`[workspace.package] version`). Sinon on publierait une image mal nommée.
      - name: Vérifier que le tag == version du workspace
        run: |
          WS_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/^version *= *"(.*)".*/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$WS_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) ≠ version workspace ($WS_VERSION)"
            exit 1
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de couches partagé entre exécutions (le Dockerfile utilise déjà
          # des cache mounts BuildKit pour le registre Cargo et target/).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publier la GitHub Release
    needs: image # ne publie la Release que si l'image est bien construite/poussée
    runs-on: ubuntu-latest
    permissions:
      contents: write # créer/éditer une Release (le job `image` n'a, lui, que read+packages)
    steps:
      - uses: actions/checkout@v6

      - name: Extraire les notes du CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Contenu entre l'en-tête `## [X.Y.Z]` et le prochain `## [` (en-tête exclu).
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          # Repli si la version n'est pas (encore) dans le CHANGELOG.
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-notes.md
          fi
          IMAGE_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          {
            echo
            echo "### Image"
            echo "\`${REGISTRY}/${IMAGE_LC}:${VERSION}\` (GHCR, publique). En prod : épingler la version exacte."
          } >> release-notes.md
          echo "--- notes générées ---"; cat release-notes.md

      - name: Créer ou mettre à jour la Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag --latest
          fi
